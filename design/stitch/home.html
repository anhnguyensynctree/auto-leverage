<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>auto-leverage | AI Research Optimizer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#6366f1",
              "background-dark": "#0a0a0f",
              "panel-dark": "#1a1a2e",
              "text-primary": "#f1f5f9",
              "text-secondary": "#94a3b8",
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
            },
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0f;
            overflow-x: hidden;
        }
        .glow-effect {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        .bg-glow {
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(10, 10, 15, 0) 70%);
        }
        /* Geometric Background Elements */
        .geo-shape {
            position: absolute;
            opacity: 0.05;
            pointer-events: none;
            border: 1px solid #6366f1;
        }
        .circle { border-radius: 50%; width: 300px; height: 300px; top: 10%; left: -150px; }
        .triangle { 
            width: 0; height: 0; 
            border-left: 100px solid transparent; 
            border-right: 100px solid transparent; 
            border-bottom: 173px solid #6366f1;
            background: transparent;
            border-top: none;
            bottom: 15%; right: 5%;
        }
        .hexagon {
            width: 100px; height: 57px;
            background-color: transparent;
            position: absolute;
            top: 20%; right: 15%;
        }
        .hexagon:before, .hexagon:after {
            content: "";
            position: absolute; width: 0; border-left: 50px solid transparent; border-right: 50px solid transparent;
        }
        .hexagon:before { bottom: 100%; border-bottom: 28px solid #6366f1; }
        .hexagon:after { top: 100%; width: 0; border-top: 28px solid #6366f1; }
    </style>
</head>
<body class="text-text-primary min-h-screen flex flex-col relative antialiased">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 bg-glow z-0"></div>
<div class="geo-shape circle"></div>
<div class="geo-shape triangle"></div>
<div class="geo-shape hexagon"></div>
<div class="fixed inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#6366f1 0.5px, transparent 0.5px); background-size: 30px 30px;"></div>
<!-- Top Navigation -->
<header class="relative z-10 w-full px-8 py-6 max-w-[1200px] mx-auto flex items-center justify-between">
<div class="text-lg font-bold tracking-tighter text-text-primary flex items-center gap-2">
<span class="w-2 h-2 bg-primary rounded-full"></span>
            auto-leverage
        </div>
<nav class="flex gap-8 items-center">
<a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors" href="#">Documentation</a>
<a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors" href="#">API</a>
<a class="text-sm font-medium text-text-secondary hover:text-primary transition-colors" href="#">Pricing</a>
</nav>
</header>
<!-- Main Content -->
<main class="relative z-10 flex-grow w-full max-w-[800px] px-8 pt-20 md:pt-32 flex flex-col gap-12 mx-auto">
<!-- Hero Section -->
<section class="flex flex-col gap-8 text-center">
<h1 class="text-4xl md:text-6xl font-bold text-text-primary leading-[1.1] tracking-tight">
                Optimize your <br/><span class="text-primary">AI research runs</span>
</h1>
<p class="text-lg md:text-xl text-text-secondary leading-relaxed max-w-[600px] mx-auto">
                What do you want to change about your current run? Tell us your goal and we'll handle the configuration.
            </p>
</section>
<!-- Search/Input Section -->
<section class="flex flex-col gap-4">
<div class="relative group">
<div class="absolute -inset-1 bg-primary/20 rounded-xl blur opacity-25 group-focus-within:opacity-50 transition duration-500"></div>
<div class="relative">
<textarea class="w-full bg-panel-dark border border-white/10 rounded-xl p-6 text-lg text-text-primary placeholder:text-text-secondary/50 focus:ring-1 focus:ring-primary focus:border-primary transition-all resize-none shadow-2xl min-h-[160px]" placeholder='e.g. "I want to download more training data" or "the model keeps crashing"'></textarea>
</div>
</div>
<button class="w-full h-[60px] bg-primary hover:bg-indigo-500 text-white font-bold rounded-xl text-lg transition-all active:scale-[0.99] glow-effect flex items-center justify-center gap-2">
                Analyze Goal
                <span class="material-symbols-outlined text-xl">bolt</span>
</button>
</section>
<!-- Technical Accents -->
<section class="mt-4 flex justify-center gap-12 text-[11px] font-mono text-text-secondary/40 uppercase tracking-widest">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 border border-primary/40"></span>
                Status: Ready
            </div>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 border border-primary/40"></span>
                Latency: 14ms
            </div>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 border border-primary/40"></span>
                Nodes: Active
            </div>
</section>
</main>
<!-- Footer -->
<footer class="relative z-10 flex justify-center w-full py-12">
<div class="text-[0.7rem] font-bold uppercase tracking-[0.2em] text-text-secondary/40">
            No account needed.
        </div>
</footer>
</body></html>
