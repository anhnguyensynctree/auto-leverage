<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirmation | auto-leverage</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#2563eb",
              "surface-bright": "#f9f9ff",
              "secondary-fixed-dim": "#b4c5ff",
              "on-tertiary-container": "#c1ffc5",
              "on-primary-container": "#eeefff",
              "surface-container": "#e7eeff",
              "on-secondary-fixed": "#00174b",
              "on-primary": "#ffffff",
              "on-tertiary-fixed": "#002109",
              "tertiary-container": "#007e37",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#dbe1ff",
              "background": "#f9f9ff",
              "on-secondary-container": "#394c84",
              "on-primary-fixed-variant": "#003ea8",
              "tertiary": "#006229",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#111c2d",
              "error": "#ba1a1a",
              "primary-fixed-dim": "#b4c5ff",
              "on-surface-variant": "#434655",
              "inverse-on-surface": "#ecf1ff",
              "surface": "#f9f9ff",
              "inverse-primary": "#b4c5ff",
              "inverse-surface": "#263143",
              "on-error": "#ffffff",
              "secondary-container": "#acbfff",
              "surface-tint": "#0053db",
              "surface-container-high": "#dee8ff",
              "surface-container-low": "#f0f3ff",
              "outline": "#737686",
              "surface-dim": "#cfdaf2",
              "tertiary-fixed": "#6bff8f",
              "primary-fixed": "#dbe1ff",
              "on-secondary-fixed-variant": "#31447b",
              "surface-variant": "#d8e3fb",
              "primary": "#004ac6",
              "surface-container-highest": "#d8e3fb",
              "tertiary-fixed-dim": "#4ae176",
              "on-background": "#111c2d",
              "outline-variant": "#c3c6d7",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed-variant": "#005321",
              "on-primary-fixed": "#00174b",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "secondary": "#495c95"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background: rgba(240, 243, 255, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center selection:bg-primary-fixed">
<!-- TopAppBar (Shared Component) -->
<header class="fixed top-0 w-full flex justify-start items-center px-8 py-6 w-full bg-transparent">
<span class="text-[12px] font-medium text-slate-400 uppercase tracking-wider">auto-leverage</span>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[560px] px-6 py-20 flex flex-col items-center">
<!-- Animated Visual Anchor -->
<div class="mb-10 w-24 h-24 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="check_circle">check_circle</span>
</div>
<!-- Heading -->
<h1 class="headline-sm text-slate-900 font-semibold text-center mb-8">Here's where we'll start</h1>
<!-- Component Card (Editorial Sanctuary Pattern) -->
<div class="w-full bg-[#f0fdf4] border border-[#bbf7d0] rounded-xl p-8 mb-10 transition-all duration-300 hover:shadow-sm">
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-tertiary" data-icon="settings_input_component">settings_input_component</span>
<h2 class="text-[18px] font-semibold text-slate-900">Model Trainer</h2>
</div>
<p class="text-[14px] leading-relaxed text-slate-600">
                You're changing how the model is built or how it learns. These settings live in <code class="bg-white/50 px-1 rounded text-primary font-mono text-xs">train.py</code> and are the only ones the AI agent edits during experiments.
            </p>
</div>
<!-- Action Stack -->
<div class="w-full flex flex-col gap-3">
<button class="w-full h-[48px] rounded-lg bg-primary hover:bg-primary-container text-white font-medium transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
                Yes, this fits
                <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full py-2 text-[14px] text-slate-500 hover:text-slate-700 transition-colors text-center font-medium">
                Start over
            </button>
</div>
</main>
<!-- Footer (Shared Component) -->
<footer class="fixed bottom-0 w-full mb-12 flex justify-center items-center w-full px-4 text-center bg-transparent">
<p class="font-inter text-[12px] text-slate-400 leading-relaxed">
            You can always go back and change your answers.
        </p>
</footer>
<!-- Decorative background elements to meet "Editorial Sanctuary" vision -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-surface-container rounded-full blur-[120px] opacity-40"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] bg-secondary-fixed rounded-full blur-[100px] opacity-20"></div>
</div>
</body></html>
